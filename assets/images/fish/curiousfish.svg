	<defs>
		<style>
			path {
				stroke: rgba(1, 56, 104, 0.2);
				stroke-width: 1;
				stroke-miterlimit:10;
				fill-rule: evenodd;
				opacity: 1; 			
			}
			
			.r { stroke: #ff0000 !important; stroke-width: 2px !important; }
			.g { stroke: #00ff00 !important; stroke-width: 2px !important; }
			.y { stroke: gold !important; stroke-width: 2px !important;} 
			
			.c1  { fill: #00050d; } 
			.c2  { fill: #001429; } 
			.c3  { fill: #002444; } 
			.c4  { fill: #003d6b; }
			.c5  { fill: #005a8f; } 
			.c6  { fill: #0075b3; } 
			.c7  { fill: #2a9fd6; } 
			.c8  { fill: #5ebfeb; } 
			.c9  { fill: #9cd9f7; } 
			.c10 { fill: #bce9ffff; } 

/* === ANIMACE RYBY === */

#curious-fish {
    transform-origin: 50% 50%;
    animation: fishBody 4s linear infinite;
}

#oko {
	// jednou yza 5 vterin animace změny barvy oka na červenou a zpět, jako mrknutí oka
	animation: eyeBlink 5s steps(1) infinite;
}


/* Ocas */
#ocas {
    transform-origin: 120px 210px; /* přibližná pozice kořene ocasu */
    animation: tailSwing 1.5s linear infinite;
}

/* Přední ploutev */
#predni-ploutev {
    transform-box: fill-box;
    transform-origin: 100% 0%;
    animation: frontFin 3s linear infinite;
}

/* Zadní spodní ploutve */
#zadni-ploutev {
    transform-box: fill-box;
    transform-origin: 100% 0%;
    animation: rearFin 3s linear infinite;
}

/* Horní ploutev */
#horni-ploutev {
    transform-box: fill-box;
    transform-origin: 0% 0%;
    animation: topFin s linear infinite;
}

/* === KEYFRAMES === */

@keyframes fishBody {
    0%   { transform: rotate(0deg); }
    50%  { transform: rotate(1.8deg); }
    100% { transform: rotate(0deg); }
}

@keyframes tailSwing {
    0%   { transform: rotate(0deg); }
    25%  { transform: rotate(2deg); }
    75%  { transform: rotate(-3deg); }
    100% { transform: rotate(0deg); }
}

@keyframes frontFin {
    0%   { transform: rotate(0deg); }
    40%  { transform: rotate(4deg); }
    100% { transform: rotate(0deg); }
}

@keyframes rearFin {
    0%   { transform: rotate(0deg); }
    40%  { transform: rotate(4deg); }
    100% { transform: rotate(0deg); }
}

@keyframes topFin {
    0%   { transform: rotate(0deg); }
    60% { transform: rotate(-2deg); }
    100% { transform: rotate(0deg); }	
}

@keyframes eyeBlink {
	0%   { fill: #002444; }
	10%  { fill: #ff0000; }
	20%  { fill: #002444; }
	100% { fill: #002444; }

		</style>
